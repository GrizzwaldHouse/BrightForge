name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets in source code..."
          # Check for common API key patterns
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" src/ public/ config/ --include="*.js" --include="*.yaml" --include="*.json" 2>/dev/null | grep -v node_modules | grep -v ".env"; then
            echo "::warning::Potential API key found in source files"
          fi
          # Check for hardcoded passwords
          if grep -rn "password.*=.*['\"][^'\"]\{8,\}['\"]" src/ --include="*.js" 2>/dev/null | grep -v node_modules | grep -v "\.test\." | grep -v "\-\-test"; then
            echo "::warning::Potential hardcoded password found"
          fi
          # Verify .env files are not committed
          if [ -f ".env" ] || [ -f ".env.local" ]; then
            echo "::error::.env file found in repository!"
            exit 1
          fi
          echo "Secret scan complete"

      - name: Verify security headers
        run: |
          echo "Checking security middleware configuration..."
          grep -l "helmet" src/api/server.js && echo "✓ Helmet middleware found"
          grep -l "authMiddleware" src/api/server.js && echo "✓ Auth middleware found"
          grep -l "generalLimiter" src/api/server.js && echo "✓ Rate limiting found"
          grep -l "cors" src/api/server.js && echo "✓ CORS configuration found"

      - name: Lint with security focus
        run: npm run lint

      - name: Check dependency licenses
        run: |
          echo "Checking dependency licenses..."
          npx license-checker --production --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;CC-BY-4.0;Unlicense;Python-2.0;BlueOak-1.0.0" --excludePrivatePackages || true
