# Forge3D Configuration
# All values can be adjusted without code changes.
# Node.js modules load this via src/forge3d/config-loader.js

python_server:
  default_port: 8001
  default_host: "127.0.0.1"
  port_range_start: 8001
  port_range_end: 8010
  startup_timeout_ms: 120000  # 2 min — first-run model downloads take longer
  startup_poll_ms: 1000
  max_restart_attempts: 3
  restart_cooldown_ms: 5000
  shutdown_grace_ms: 5000
  command_timeout_ms: 15000

health_check:
  interval_ms: 10000
  timeout_ms: 5000
  max_consecutive_failures: 3

generation:
  timeout_ms: 600000  # 10 min — first generation downloads ~3GB model from HuggingFace
  full_pipeline_multiplier: 2
  max_image_size_bytes: 20971520  # 20 MB
  min_prompt_length: 3
  max_prompt_length: 2000
  download_timeout_ms: 30000
  default_mesh_model: "hunyuan3d"
  default_image_model: "sdxl"

database:
  path: "data/forge3d.db"
  journal_mode: "WAL"
  busy_timeout_ms: 5000

project:
  output_dir: "data/output"
  sanitize_pattern: "[<>:\"/\\\\|?*]"

queue:
  process_interval_ms: 100
  max_size: 50
  max_retries: 2
  temp_dir: "data/temp"
  temp_max_age_ms: 3600000  # 1 hour

api:
  raw_body_limit: "20mb"
  history_default_limit: 50

session:
  id_length: 12
  default_list_limit: 20
  cleanup_max_age_ms: 3600000  # 1 hour
  progress:
    image_start_pct: 10
    mesh_start_pct: 10
    mesh_end_pct: 100
    mesh_after_image_pct: 80

viewer:
  default_width: 600
  default_height: 400
  background_color: "0x1a1a2e"
  camera:
    fov: 45
    near: 0.1
    far: 1000
    default_position: [3, 2, 3]
  frame_distance_multiplier: 1.5
  frame_position_offsets: [0.7, 0.5, 0.7]
  orbit_controls:
    damping_factor: 0.05
    min_distance: 0.5
    max_distance: 50
  lights:
    ambient:
      color: "0x888fff"
      intensity: 0.5
    directional:
      color: "0xffffff"
      intensity: 1.0
      position: [5, 10, 7]
    fill:
      color: "0x8888ff"
      intensity: 0.3
      position: [-5, 3, -5]
  grid:
    size: 10
    divisions: 20
    color1: "0x3a3a54"
    color2: "0x252941"

fbx_export:
  enabled: true
  auto_convert: true
  coordinate_system: "unreal"

materials:
  extract_on_convert: true
  default_preset: "ue5-standard"
  texture_output_dir: "textures"

ui:
  generation_polling_ms: 2000
  vram_polling_ms: 10000
  vram_thresholds:
    ok_pct: 70
    warn_pct: 85

# Prompt templates for quick generation
prompt_templates:
  - category: "Weapons"
    label: "Medieval Sword"
    prompt: "A detailed medieval longsword with ornate crossguard, leather-wrapped grip, and polished steel blade, high-poly 3D model"
  - category: "Weapons"
    label: "Sci-Fi Blaster"
    prompt: "A futuristic sci-fi energy blaster pistol with glowing blue accents, sleek chrome body, and ergonomic grip, game-ready 3D asset"
  - category: "Furniture"
    label: "Wooden Chair"
    prompt: "A classic wooden dining chair with turned legs, curved backrest, and natural oak finish, realistic 3D furniture model"
  - category: "Furniture"
    label: "Modern Desk"
    prompt: "A minimalist modern office desk with clean lines, white laminate top, and steel hairpin legs, 3D interior asset"
  - category: "Nature"
    label: "Oak Tree"
    prompt: "A large mature oak tree with thick trunk, sprawling branches, and dense green canopy, detailed 3D nature model"
  - category: "Nature"
    label: "Rock Formation"
    prompt: "A rugged natural rock formation with layered sedimentary textures, moss patches, and realistic weathering, 3D environment prop"
  - category: "Vehicles"
    label: "Sports Car"
    prompt: "A sleek modern sports car with aerodynamic body, low profile, glossy red paint, and detailed wheels, high-quality 3D vehicle"
  - category: "Vehicles"
    label: "Spaceship"
    prompt: "A compact sci-fi spaceship with angular hull plating, engine nacelles, and glowing thruster ports, game-ready 3D spacecraft"
  - category: "Characters"
    label: "Knight"
    prompt: "A medieval knight in full plate armor with visored helm, chainmail details, and a heraldic tabard, 3D character model"
  - category: "Characters"
    label: "Robot"
    prompt: "A humanoid robot with articulated joints, exposed mechanical parts, glowing LED eyes, and brushed metal surface, 3D character asset"
  - category: "Architecture"
    label: "Castle Tower"
    prompt: "A medieval castle tower with crenellated battlements, arrow slits, stone block texture, and a conical roof, 3D architecture model"
  - category: "Architecture"
    label: "Modern House"
    prompt: "A contemporary two-story house with flat roof, floor-to-ceiling windows, white render walls, and wooden deck, 3D architectural visualization"

# LLM-powered prompt enhancement
prompt_enhancer:
  task_routing_key: "prompt_enhance"
  system_prompt: "You are a 3D model prompt optimizer. Given a short user prompt, rewrite it into a detailed, descriptive prompt optimized for text-to-3D generation. Focus on shape, materials, textures, and visual details. Keep the result under 200 words. Return ONLY the enhanced prompt text, no explanations."
  max_tokens: 300

# Batch generation limits
batch:
  max_prompts: 5
