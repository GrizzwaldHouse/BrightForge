# BrightForge Orchestration Runtime Configuration
# All values can be adjusted without code changes.
# Loaded by src/orchestration/index.js at init time.

storage:
  db_path: "data/orchestration.db"
  journal_mode: "WAL"
  busy_timeout_ms: 5000

event_bus:
  ring_buffer_size: 100
  valid_event_types:
    - task_started
    - analysis_completed
    - architecture_decided
    - implementation_started
    - file_written
    - research_logged
    - risk_flagged
    - todo_added
    - task_paused
    - task_resumed
    - task_completed
    - audit_warning
    - audit_passed
    - agent_registered
    - agent_heartbeat
    - agent_disconnected
    - build_started
    - build_completed
    - build_failed
    - test_started
    - test_completed
    - test_failed
    - review_started
    - review_completed
    - survey_started
    - survey_completed
    - recording_started
    - recording_stopped
    - recording_failed
    - stability_started
    - stability_checkpoint
    - stability_completed
    - idea_detected
    - idea_classified
    - idea_duplicate
    - idea_scored
    - idea_ranked
    - research_started
    - research_completed
    - idea_indexed
    - idea_linked
  forward_to_telemetry: true

task_state:
  id_length: 12
  valid_statuses:
    - active
    - paused
    - completed
    - failed
  valid_phases:
    - analysis
    - design
    - implementation
    - validation
  valid_agents:
    - Claude
    - Ollama
    - Planner
    - Builder
    - Tester
    - Reviewer
    - Survey
    - Recorder
    - IngestionAgent
    - ClassificationAgent
    - ScoringAgent
    - ResearchAgent
    - IndexingAgent

supervisor:
  penalty_per_violation: 0.1
  weights:
    structural: 0.4
    coding_standards: 0.3
    continuity: 0.3
  thresholds:
    pass: 0.8
    warning: 0.5
  required_standards:
    - observer_pattern
    - no_hardcoded_values
    - structured_logging
    - typed_errors
    - configuration_driven
    - file_headers

handoff:
  require_audit: true
  min_confidence: 0.5
  max_handoffs_per_task: 10

agents:
  - name: Claude
    type: cloud
    capabilities:
      planning: true
      architecture: true
      code_review: true
      implementation: true
  - name: Ollama
    type: local
    capabilities:
      planning: true
      architecture: false
      code_review: false
      implementation: true
  - name: Planner
    type: pipeline
    capabilities:
      planning: true
      decomposition: true
  - name: Builder
    type: pipeline
    capabilities:
      implementation: true
      orchestration: true
  - name: Tester
    type: pipeline
    capabilities:
      testing: true
      linting: true
  - name: Reviewer
    type: pipeline
    capabilities:
      code_review: true
      auditing: true
  - name: Survey
    type: pipeline
    capabilities:
      feedback: true
  - name: Recorder
    type: pipeline
    capabilities:
      recording: true

websocket:
  heartbeat_interval_ms: 30000
  stale_timeout_ms: 90000
  channels:
    - agents
    - ui
    - system
    - recording

obs:
  enabled: true
  host: "localhost"
  port: 4455
  password: ""
  reconnect_attempts: 3
  reconnect_delay_ms: 2000

idea_intelligence:
  scan_directory: "./ideas"
  supported_extensions:
    - ".md"
    - ".txt"
    - ".json"
  scoring:
    weights:
      profitability: 0.30
      portfolio_value: 0.25
      execution_speed: 0.15
      complexity_inverse: 0.15
      novelty: 0.15
    thresholds:
      HIGH: 0.75
      MID: 0.50
      LOW: 0.25
  classification:
    categories:
      - AI
      - Tooling
      - Product
      - Experimental
      - Game Dev
      - Infrastructure
    duplicate_threshold: 0.92
    related_threshold: 0.70
  embedding:
    model: "nomic-embed-text"
    dimensions: 768
  research:
    min_priority: "MID"
